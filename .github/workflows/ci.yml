name: Verify VeilPledge

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect tracked Preprod deployment
        id: preprod
        shell: bash
        run: |
          if test -s deployments/preprod.json; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Use Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Compact 0.31.1
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/compact" update 0.31.1
          test "$("$HOME/.local/bin/compact" compile --version)" = "0.31.1"

      - name: Compile ZK circuits
        run: npm run compile

      - name: Run contract tests
        run: npm run test:contract

      - name: Type-check contract application
        run: npm run typecheck

      - name: Prepare browser contract artifacts
        run: npm run web:prepare

      - name: Run web tests
        run: npm run web:test

      - name: Type-check web application
        run: npm run web:typecheck

      - name: Build production site
        env:
          REQUIRE_PREPROD_DEPLOYMENT: ${{ steps.preprod.outputs.present == 'true' && '1' || '0' }}
        run: npm run web:build

      - name: Verify production bundle
        shell: bash
        run: |
          test -s web/dist/index.html
          grep -Fq '/assets/' web/dist/index.html

          for file in \
            web/dist/keys/createPledge.prover \
            web/dist/keys/createPledge.verifier \
            web/dist/keys/completePledge.prover \
            web/dist/keys/completePledge.verifier \
            web/dist/zkir/createPledge.bzkir \
            web/dist/zkir/createPledge.zkir \
            web/dist/zkir/completePledge.bzkir \
            web/dist/zkir/completePledge.zkir
          do
            test -s "$file" || {
              echo "Missing artifact: $file"
              exit 1
            }
          done

          find web/dist/assets -type f -name '*.js' -print -quit | grep -q .

          tracked="$(git ls-files -- \
            contracts/managed \
            web/public/keys \
            web/public/zkir \
            web/src/generated \
            web/dist)"
          test -z "$tracked" || {
            echo "Generated files must not be tracked:"
            echo "$tracked"
            exit 1
          }

      - name: Verify tracked Preprod deployment
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.preprod.outputs.present == 'true'
        run: npm run test:e2e -- --network preprod

      - name: Upload verified production bundle
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.preprod.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: veilpledge-web-dist
          path: web/dist
          retention-days: 7
